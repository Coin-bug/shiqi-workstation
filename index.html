<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>士气工作站</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app" class="app" aria-live="polite">
      <section id="entryPage" class="page page-entry is-active">
        <div class="entry-bg"></div>
        <img class="entry-logo" src="/assets/source/切图/工作台_首页_默认/工作台_首页_默认_logo.png" alt="士气工作站" />
        <img class="entry-title" src="/assets/source/切图/工作台_首页_默认/工作台_首页_默认_neiorong.png" alt="WORK SPACE" />
        <button id="startButton" class="start-button" type="button" aria-label="开始使用士气工作站">
          <span>开始使用</span>
        </button>
      </section>

      <section id="workspacePage" class="page page-workspace" aria-label="工作站首页">
        <aside class="workspace-sidebar" aria-label="工作站导航">
          <div class="sidebar-logo">
            <img src="/assets/source/切图/工作台_首页/导航栏_logo.png" alt="士气工作站" />
          </div>
          <nav class="workspace-menu">
            <button class="menu-hit is-selected" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单一_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单一_icon选中.svg" alt="" />
              <span>提示词整理</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单二_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单二_icon选中.svg" alt="" />
              <span>Skill 整理</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单三_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单三_icon选中.svg" alt="" />
              <span>需求分析</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单四_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单四_icon选中.svg" alt="" />
              <span>自动提取色板</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单五_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单五_icon选中.svg" alt="" />
              <span>一键自动核查</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单六_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单六_icon选中.svg" alt="" />
              <span>人感文案编辑器</span>
            </button>
            <button class="menu-hit" type="button">
              <img class="menu-icon icon-off" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单七_icon未选.svg" alt="" />
              <img class="menu-icon icon-on" src="/assets/source/切图/工作台_首页/菜单栏_菜单_菜单七_icon选中.svg" alt="" />
              <span>风格延展</span>
            </button>
          </nav>
        </aside>

        <section class="workspace-main" aria-label="提示词整理">
          <header class="workspace-topbar">
            <div class="topbar-texture"></div>
            <button class="api-key-button" type="button" aria-label="API key">
              <img src="/assets/source/切图/工作台_首页/导航栏_API Key_neirong_icon.svg" alt="" />
              <span>API key</span>
            </button>
          </header>

          <div class="workspace-titlebar">
            <div class="workspace-title">
              <span>全部提示词</span>
              <img src="/assets/source/切图/工作台_首页/标题栏_biaoti_icon.svg" alt="" />
            </div>
            <label class="workspace-search">
              <img src="/assets/source/切图/工作台_首页/标题栏_gongju_search_iocn.svg" alt="" />
              <input type="search" placeholder="输入关键词" />
              <span>搜索</span>
            </label>
          </div>

          <div class="workspace-scroll" id="workspaceScroll">
            <div id="cardHotzones" class="card-hotzones" aria-label="提示词卡片列表"></div>
            <div id="savedCards" class="saved-cards" aria-label="新增提示词"></div>
          </div>

          <div class="upload-dock" aria-hidden="true"></div>
          <button id="uploadButton" class="upload-button" type="button" aria-label="上传参考图"></button>
        </section>
      </section>

      <section id="modalLayer" class="modal-layer" aria-hidden="true">
        <div class="modal-stage">
          <img class="workspace-shot modal-workspace-bg" src="/assets/figma/workspace.png" alt="" />
          <div class="page-mask"></div>
          <div class="upload-modal">
            <div class="modal-bg"></div>
            <div class="modal-title">上传参考图 <img src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_标题栏_icon.svg" alt="" /></div>
            <button id="closeModal" class="modal-close" type="button" aria-label="关闭">
              <img src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_标题栏_guanbi.svg" alt="" />
            </button>

            <label id="dropZone" class="drop-zone" aria-label="上传参考图">
              <input id="fileInput" type="file" accept="image/*" />
              <span id="dropHint" class="drop-hint">点击或拖拽图片上传</span>
              <img id="previewImage" class="preview-image" alt="上传图片预览" />
              <span id="uploadError" class="upload-error">上传失败，请重新上传</span>
            </label>

            <section class="prompt-panel">
              <div class="prompt-header">
                <h2>生成 Prompt</h2>
                <img class="prompt-brand" src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_prompt_zhuang1.png" alt="SHIQI-PROMPT" />
              </div>

              <div id="loadingPanel" class="loading-panel">
                <img class="loading-star" src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_prompt_jiazia_xingxing.svg" alt="" />
                <div id="loadingText" class="loading-text">正在识别画面主体</div>
                <div class="progress-shell">
                  <img class="progress-track" src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_prompt_jiazia_jindu_加载_wei.svg" alt="" />
                  <div id="progressBar" class="progress-bar">
                    <img src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_prompt_jiazia_jindu_加载_wancheng.svg" alt="" />
                  </div>
                </div>
              </div>

              <button id="savePrompt" class="save-button" type="button">保存</button>
              <form id="resultPanel" class="result-panel">
                <label class="field-title">标题</label>
                <input id="titleInput" class="prompt-input title-input" value="静谧之中听见野性" />

                <label class="field-title tags-title">标签 <span>（最多3个标签）</span></label>
                <input id="tagsInput" class="prompt-input tags-input" value="野性静音；可爱拟人；高端耳机" />

                <label class="field-title cn-title">中文 Prompt</label>
                <button id="copyChinese" class="inline-copy cn-copy" type="button">复制</button>
                <textarea id="chinesePrompt" class="prompt-textarea chinese-area">高端耳机产品广告海报，一只棕熊正面居中肖像，闭着眼睛，神情平静，佩戴黑色头戴式无线降噪耳机，背景为极简浅灰色，大面积留白，画面中央突出产品与动物结合的反差感，整体构图对称，视觉高级克制，商业广告摄影风格，真实毛发细节，柔和棚拍光线，海报版式简洁，带品牌标题与产品文案，突出静谧、沉浸、降噪、专业音质的感觉。</textarea>

                <label class="field-title en-title">英文 Prompt</label>
                <button id="copyEnglish" class="inline-copy en-copy" type="button">复制</button>
                <textarea id="englishPrompt" class="prompt-textarea english-area">This high-end headphone product advertisement poster features a centrally centered portrait with a calm expression, wearing black wireless noise-canceling headphones. The background is minimalist light gray with ample white space, emphasizing the contrast between product and subject, with symmetrical composition, refined commercial photography lighting, realistic texture, and a clean poster layout.</textarea>
              </form>
              <img class="prompt-decor" src="/assets/source/切图/工作台_首页_hover_shangchuan_prompt_fenxi/添加图片_prompt_zhuang2.png" alt="" />
            </section>
          </div>
        </div>
      </section>

      <div id="toast" class="toast" role="status"></div>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
